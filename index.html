<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nwxt</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  margin: 0;
  font-family: 'Press Start 2P', cursive;
  background: radial-gradient(circle at top, #0f0f0f, #111);
  color: #0ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  text-align: center;
  background: rgba(10,10,10,0.8);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 0 50px #0ff;
  width: 320px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  0% { box-shadow: 0 0 25px #0ff; }
  100% { box-shadow: 0 0 50px #0ff; }
}

.avatar {
  width: 120px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 3px solid #0ff;
}

h1 {
  margin: 10px 0;
  color: #0ff;
}

p {
  color: #0ff;
  font-size: 10px;
  margin-bottom: 20px;
}

.link {
  display: block;
  background: #000;
  color: #0ff;
  text-decoration: none;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  transition: 0.2s;
  border: 2px solid #0ff;
}

.link:hover {
  background: #0ff;
  color: #000;
  transform: scale(1.05);
}
</style>
</head>
<body>
<div class="card">
<img class="avatar" src="https://i.imgur.com/yourimage.png" alt="Avatar">
<h1>nwxt</h1>
<p>Gaming • Streaming • Community</p>
<a class="link" href="#">TikTok</a>
<a class="link" href="#">Instagram</a>
<a class="link" href="#">Discord
